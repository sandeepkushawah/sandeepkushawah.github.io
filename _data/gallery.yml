# Research gallery content. Each section has a title, description, and items.
# item types: "image" (static figure), "gif" (animation), "video" (mp4).
# poster = lightweight thumbnail shown in the grid; src = full media opened in the lightbox.

- title: "Dynamics &amp; cooperative motion"
  desc: "Animations straight from molecular dynamics trajectories, showing how particles move and cluster as the liquid is supercooled."
  items:
    - { type: gif, poster: /images/posters/anim1_glass_transition.jpg, src: /images/anim1_glass_transition.gif, title: "Particle dynamics across the glass transition", desc: "Single-particle motion from liquid to glass" }
    - { type: video, poster: /images/posters/3D_density_variation.jpg, src: /images/3D_density_variation.mp4, title: "3D density variation", desc: "Density vs radial distance, KA mixture" }
    - { type: image, poster: /images/diffused_particle.jpg, src: /images/diffused_particle.jpg, title: "Mobile-particle trajectory", desc: "Path of a diffusing particle in a supercooled liquid" }

