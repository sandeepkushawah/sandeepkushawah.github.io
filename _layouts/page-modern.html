<!doctype html>
<html lang="{{ site.locale | slice: 0,2 | default: 'en' }}" data-theme="light">
<head>
  {% include modern-head.html %}
</head>
<body>
  {% include modern-nav.html %}
  <main id="main">
    <section class="page-hero">
      <div class="container">
        {% if page.eyebrow %}<p class="eyebrow" style="color:var(--teal-300)">{{ page.eyebrow }}</p>{% endif %}
        <h1>{{ page.title }}</h1>
        {% if page.subtitle %}<p>{{ page.subtitle }}</p>{% endif %}
      </div>
    </section>
    <section class="section" style="padding-top:clamp(2.5rem,6vw,3.5rem)">
      <div class="container">
        {{ content }}
      </div>
    </section>
  </main>
  {% include modern-footer.html %}
</body>
</html>
